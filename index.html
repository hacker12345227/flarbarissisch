<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flarbarissisch Translator</title>

<link rel="icon" href="favicon.png">

<meta property="og:title" content="Flarbarissisch Translator">
<meta property="og:description" content="Vertaal Nederlands naar Flarbarissisch en luister naar de uitspraak">
<meta property="og:image" content="favicon.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<div class="card">

<h1>🌸 Flarbarissisch Translator</h1>

<div class="toolbar">

<span id="langLeft">Nederlands</span>

<button id="switchBtn" class="switch-btn">⇄</button>

<span id="langRight">Flarbarissisch</span>

<button id="themeToggle" class="theme-btn">🌙</button>

</div>

<div class="panes">

<div class="pane">

<textarea id="input" placeholder="Typ tekst..."></textarea>

<div id="autocomplete" class="autocomplete"></div>

<div class="buttons">
<button id="speakInputBtn" class="speak-btn">🔊 Beluister</button>
</div>

</div>

<div class="pane">

<textarea id="output" readonly></textarea>

<div class="buttons">
<button id="copyBtn" class="copy-btn">📋 Copy</button>
<button id="speakOutputBtn" class="speak-btn">🔊 Beluister</button>
</div>

</div>

</div>

<div class="voice-selector">

<label>Stem:</label>

<select id="voiceSelect">
<option value="male">Man</option>
<option value="female">Vrouw</option>
</select>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
