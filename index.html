<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Flarbarissisch Translator</title>

  <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
  <link rel="shortcut icon" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./favicon.png" />

  <meta name="description" content="Vertaal Nederlands naar Flarbarissisch en luister naar de uitspraak." />

  <meta property="og:title" content="Flarbarissisch Translator" />
  <meta property="og:description" content="Vertaal Nederlands naar Flarbarissisch en luister naar de uitspraak." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="./banner.png" />
  <meta property="og:image:alt" content="Flarbarissisch Translator banner" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Flarbarissisch Translator" />
  <meta name="twitter:description" content="Vertaal Nederlands naar Flarbarissisch en luister naar de uitspraak." />
  <meta name="twitter:image" content="./banner.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>🌸 Flarbarissisch Translator</h1>

      <div class="toolbar">
        <span id="langLeft" class="lang-label">Nederlands</span>

        <button id="switchBtn" class="switch-btn" type="button" aria-label="Wissel talen">
          ⇄
        </button>

        <span id="langRight" class="lang-label">Flarbarissisch</span>

        <button id="themeToggle" class="theme-btn" type="button" aria-label="Wissel thema">
          🌙
        </button>
      </div>

      <div class="panes">
        <div class="pane">
          <textarea id="input" placeholder="Typ tekst..."></textarea>

          <div class="buttons">
            <button id="speakInputBtn" class="speak-btn" type="button">🔊 Beluister</button>
          </div>
        </div>

        <div class="pane">
          <textarea id="output" readonly placeholder="Vertaling..."></textarea>

          <div class="buttons">
            <button id="copyBtn" class="copy-btn" type="button">📋 Copy</button>
            <button id="speakOutputBtn" class="speak-btn" type="button">🔊 Beluister</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
