<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flarbarissisch Translator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>🌸 Flarbarissisch Translator</h1>

      <div class="toolbar">
        <span id="langLeft" class="lang">Nederlands</span>

        <button id="switchBtn" class="switch-btn" type="button" aria-label="Wissel talen">
          <span class="switch-icon">⇄</span>
        </button>

        <span id="langRight" class="lang">Flarbarissisch</span>
      </div>

<div class="toolbar">

<span id="langLeft" class="lang">Nederlands</span>

<button id="switchBtn" class="switch-btn">
<span class="switch-icon">⇄</span>
</button>

<span id="langRight" class="lang">Flarbarissisch</span>

<button id="themeToggle" class="theme-btn">
🌙
</button>

</div>

      <div class="panes" id="panes">
        <div class="pane">
          <label for="input" class="pane-label">Tekst</label>
          <div class="input-wrap">
            <textarea id="input" placeholder="Typ tekst..." spellcheck="false"></textarea>
            <div id="autocomplete" class="autocomplete"></div>
          </div>
        </div>

        <div class="pane">
          <div class="output-top">
            <label for="output" class="pane-label">Vertaling</label>
            <button id="copyBtn" class="copy-btn" type="button">📋 Kopieer</button>
          </div>
          <textarea id="output" placeholder="Vertaling..." readonly></textarea>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
